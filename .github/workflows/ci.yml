name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # Job 1: Build & Test
  # ─────────────────────────────────────────
  test:
    name: Build & Test
    runs-on: macos-14        # Apple Silicon runner (Xcode 15+)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Build (debug)
        run: swift build -c debug

      - name: Run tests
        run: swift test --enable-code-coverage

      - name: Export coverage (lcov)
        run: |
          xcrun llvm-cov export \
            .build/debug/ThermaPackageTests.xctest/Contents/MacOS/ThermaPackageTests \
            -instr-profile .build/debug/codecov/default.profdata \
            -format=lcov > coverage.lcov

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage.lcov

  # ─────────────────────────────────────────
  # Job 2: Release Build (main branch only)
  # ─────────────────────────────────────────
  build-release:
    name: Release Build
    runs-on: macos-14
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Build (release, arm64)
        run: swift build -c release --arch arm64

      - name: Copy binary to staging
        run: |
          mkdir -p staging/Therma.app/Contents/MacOS
          mkdir -p staging/Therma.app/Contents/Resources
          cp .build/release/Therma staging/Therma.app/Contents/MacOS/Therma
          cp Info.plist staging/Therma.app/Contents/Info.plist
          cp AppIcon.icns staging/Therma.app/Contents/Resources/AppIcon.icns 2>/dev/null || true

      # ── Code Signing (requires secrets) ──
      # To enable: add DEVELOPER_ID_CERT (base64 p12) and DEVELOPER_ID_PASS to repo secrets.
      - name: Import signing certificate
        if: ${{ env.DEVELOPER_ID_CERT != '' }}
        env:
          DEVELOPER_ID_CERT: ${{ secrets.DEVELOPER_ID_CERT }}
          DEVELOPER_ID_PASS: ${{ secrets.DEVELOPER_ID_PASS }}
        run: |
          echo "$DEVELOPER_ID_CERT" | base64 --decode > cert.p12
          security create-keychain -p "" build.keychain
          security import cert.p12 -k build.keychain -P "$DEVELOPER_ID_PASS" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          security default-keychain -s build.keychain

      - name: Sign app
        if: ${{ env.DEVELOPER_ID != '' }}
        env:
          DEVELOPER_ID: ${{ secrets.DEVELOPER_ID }}
        run: |
          codesign \
            --force \
            --options runtime \
            --sign "$DEVELOPER_ID" \
            --deep \
            --strict \
            staging/Therma.app

      - name: Create DMG
        run: |
          hdiutil create \
            -volname "Therma" \
            -srcfolder staging/Therma.app \
            -ov \
            -format UDZO \
            Therma.dmg

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Therma-${{ github.sha }}
          path: Therma.dmg
          retention-days: 30
