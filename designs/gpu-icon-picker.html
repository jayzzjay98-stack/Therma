<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Therma – GPU Icon Picker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0b0d14;
    --surface: #12151f;
    --surface2: #1a1e2e;
    --border: rgba(255,255,255,0.07);
    --accent: #9C5FF0;
    --accent2: #6C3FD0;
    --text: #f0f0f5;
    --muted: rgba(255,255,255,0.45);
    --green: #34d883;
  }

  body {
    background: var(--bg);
    font-family: 'Inter', sans-serif;
    color: var(--text);
    min-height: 100vh;
    padding: 40px 24px 80px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── Header ── */
  header {
    text-align: center;
    margin-bottom: 48px;
  }
  header .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(156,95,240,0.12);
    border: 1px solid rgba(156,95,240,0.3);
    border-radius: 999px;
    padding: 4px 12px;
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.06em;
    margin-bottom: 16px;
  }
  header h1 {
    font-size: 36px;
    font-weight: 800;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.6) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 10px;
  }
  header p {
    font-size: 15px;
    color: var(--muted);
    max-width: 460px;
    line-height: 1.6;
  }

  /* ── macOS Menu Bar Preview ── */
  .menubar-preview {
    width: 100%;
    max-width: 760px;
    margin-bottom: 48px;
  }
  .menubar-preview label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .menubar-frame {
    background: linear-gradient(180deg, #2a2a2a 0%, #1f1f1f 100%);
    border-radius: 10px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding: 0 12px;
    gap: 2px;
    border: 1px solid rgba(255,255,255,0.12);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 0 0.5px rgba(0,0,0,0.8);
    position: relative;
    overflow: hidden;
  }
  .menubar-frame::before {
    content: '';
    position: absolute;
    left: 0; right: 0; top: 0; height: 1px;
    background: rgba(255,255,255,0.12);
  }
  /* Static existing items */
  .mb-static {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 0 8px;
    color: rgba(255,255,255,0.82);
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
  }
  .mb-item {
    display: flex;
    align-items: center;
    gap: 3px;
    opacity: 0.7;
    font-size: 11.5px;
  }
  .mb-item svg { width: 12px; height: 12px; }
  /* GPU item highlight */
  .mb-gpu {
    display: flex;
    align-items: center;
    gap: 4px;
    background: rgba(156,95,240,0.18);
    border: 1px solid rgba(156,95,240,0.35);
    border-radius: 4px;
    padding: 1px 7px 1px 5px;
    font-size: 11.5px;
    font-family: 'JetBrains Mono', monospace;
    color: #fff;
    transition: all 0.25s ease;
    position: relative;
  }
  .mb-gpu svg { width: 12px; height: 12px; }
  .mb-gpu .gpu-pct { font-weight: 600; color: #c8a0ff; }
  .mb-separator { width: 0.5px; height: 14px; background: rgba(255,255,255,0.15); margin: 0 2px; }
  .mb-time {
    font-size: 12px;
    color: rgba(255,255,255,0.82);
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    margin-left: 8px;
  }

  /* pulse on change */
  @keyframes pulse-glow {
    0%   { box-shadow: 0 0 0 0 rgba(156,95,240,0.6); }
    60%  { box-shadow: 0 0 0 6px rgba(156,95,240,0); }
    100% { box-shadow: 0 0 0 0 rgba(156,95,240,0); }
  }
  .mb-gpu.changed { animation: pulse-glow 0.55s ease; }

  /* ── Icon Grid ── */
  .grid-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-align: left;
    width: 100%;
    max-width: 760px;
    margin-bottom: 12px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
    width: 100%;
    max-width: 760px;
    margin-bottom: 36px;
  }
  .icon-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 20px 12px 16px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
    user-select: none;
  }
  .icon-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(156,95,240,0.14) 0%, transparent 70%);
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .icon-card:hover { border-color: rgba(156,95,240,0.35); transform: translateY(-2px); }
  .icon-card:hover::before { opacity: 1; }
  .icon-card.selected {
    border-color: var(--accent);
    background: rgba(156,95,240,0.08);
    box-shadow: 0 0 0 1px var(--accent), 0 8px 24px rgba(156,95,240,0.2);
  }
  .icon-card.selected::before { opacity: 1; }

  .icon-card .check {
    position: absolute;
    top: 10px; right: 10px;
    width: 18px; height: 18px;
    background: var(--accent);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    transform: scale(0.5);
    transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .icon-card.selected .check { opacity: 1; transform: scale(1); }
  .icon-card .check svg { width: 10px; height: 10px; }

  .icon-viz {
    width: 44px; height: 44px;
    margin: 0 auto 12px;
    display: flex; align-items: center; justify-content: center;
    color: rgba(255,255,255,0.55);
    transition: color 0.2s;
  }
  .icon-card:hover .icon-viz, .icon-card.selected .icon-viz { color: #c8a0ff; }
  .icon-viz svg { width: 36px; height: 36px; }

  .icon-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9.5px;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 4px;
    transition: color 0.2s;
    word-break: break-all;
  }
  .icon-card.selected .icon-name { color: #c8a0ff; }
  .icon-desc {
    font-size: 10px;
    color: rgba(255,255,255,0.28);
    line-height: 1.4;
  }

  /* ── Apply Button ── */
  .apply-bar {
    width: 100%;
    max-width: 760px;
    display: flex;
    justify-content: center;
  }
  .apply-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    background: linear-gradient(135deg, #9C5FF0 0%, #6C3FD0 100%);
    border: none;
    border-radius: 12px;
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    font-family: 'Inter', sans-serif;
    padding: 13px 32px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(156,95,240,0.35);
    transition: all 0.2s ease;
  }
  .apply-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 28px rgba(156,95,240,0.45); }
  .apply-btn:active { transform: translateY(0); }
  .apply-btn svg { width: 16px; height: 16px; }
  .apply-btn .selected-name {
    background: rgba(255,255,255,0.18);
    border-radius: 6px;
    padding: 2px 8px;
    font-size: 11px;
    font-weight: 600;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>

<header>
  <div class="badge">
    <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><circle cx="5" cy="5" r="4" fill="#9C5FF0"/><path d="M3 5l1.5 1.5L7 3.5" stroke="#fff" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Therma Icon Picker
  </div>
  <h1>GPU Menu Bar Icon</h1>
  <p>คลิกเลือกไอคอน แล้วดูตัวอย่างใน Menu Bar Preview ด้านบนได้เลย</p>
</header>

<!-- Menu Bar Preview -->
<div class="menubar-preview">
  <label>▲ Live Preview — macOS Menu Bar</label>
  <div class="menubar-frame">
    <div class="mb-static">
      <div class="mb-item">
        <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.3"><rect x="1" y="8" width="10" height="2" rx="0.5"/><rect x="3" y="1" width="4" height="6" rx="0.5"/></svg>
        68%
      </div>
      <div class="mb-item">
        <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M6 1v4M6 7v4M1 6h4M7 6h4" stroke-linecap="round"/></svg>
        ↓1.2M ↑0.4M
      </div>
      <div class="mb-item">
        <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M6 2a1 1 0 0 1 1 1c0 3-4 4-4 7h6c0-3-4-4-4-7a1 1 0 0 1 1-1z" stroke-linejoin="round"/></svg>
        54°C
      </div>
      <div class="mb-item">
        <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.3"><circle cx="6" cy="6" r="4"/><path d="M6 6l2-2" stroke-linecap="round"/></svg>
        37%
      </div>
    </div>
    <div class="mb-separator"></div>
    <div class="mb-gpu" id="mb-gpu">
      <span id="mb-icon" class="icon-viz" style="width:14px;height:14px;margin:0;">
        <!-- injected by JS -->
      </span>
      <span class="gpu-pct">24%</span>
    </div>
    <div class="mb-separator"></div>
    <div class="mb-time">17:12</div>
  </div>
</div>

<!-- Grid -->
<div class="grid-title">เลือกไอคอน GPU (10 ตัวเลือก)</div>
<div class="grid" id="icon-grid"></div>

<!-- Apply -->
<div class="apply-bar">
  <button class="apply-btn" onclick="copyName()">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="4" width="9" height="10" rx="1.5"/><path d="M5 4V3a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v9a1 1 0 0 1-1 1h-1" stroke-linecap="round"/></svg>
    Copy SF Symbol name
    <span class="selected-name" id="apply-name">display</span>
  </button>
</div>

<script>
const icons = [
  {
    name: 'display',
    desc: 'GPU renders to display',
    svg: `<svg viewBox="0 0 36 36" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="5" width="30" height="20" rx="3"/>
      <path d="M12 30h12M18 25v5"/>
    </svg>`
  },
  {
    name: 'sparkles',
    desc: 'Shader & pixel effects',
    svg: `<svg viewBox="0 0 36 36" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M18 4l2 8 8 2-8 2-2 8-2-8-8-2 8-2z"/>
      <path d="M8 6l1 3 3 1-3 1-1 3-1-3-3-1 3-1z" stroke-width="1.4"/>
      <path d="M28 22l1 3 3 1-3 1-1 3-1-3-3-1 3-1z" stroke-width="1.4"/>
    </svg>`
  },
  {
    name: 'rays',
    desc: 'Ray tracing',
    svg: `<svg viewBox="0 0 36 36" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
      <circle cx="18" cy="18" r="5"/>
      <path d="M18 4v5M18 27v5M4 18h5M27 18h5"/>
      <path d="M8.5 8.5l3.5 3.5M24 24l3.5 3.5M27.5 8.5l-3.5 3.5M12 24l-3.5 3.5"/>
    </svg>`
  },
  {
    name: 'triangle',
    desc: '3D polygon geometry',
    svg: `<svg viewBox="0 0 36 36" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M18 6L31 28H5L18 6z"/>
    </svg>`
  },
  {
    name: 'checkerboard.rectangle',
    desc: 'GPU test pattern',
    svg: `<svg viewBox="0 0 36 36" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="9" width="30" height="18" rx="2.5"/>
      <rect x="3" y="9" width="7.5" height="6" rx="0"/>
      <rect x="18" y="9" width="7.5" height="6" rx="0"/>
      <rect x="10.5" y="15" width="7.5" height="6" rx="0"/>
      <rect x="25.5" y="15" width="7.5" height="6" rx="0"/>
      <rect x="3" y="21" width="7.5" height="6" rx="0"/>
      <rect x="18" y="21" width="7.5" height="6" rx="0"/>
    </svg>`
  },
  {
    name: 'rectangle.3.group',
    desc: 'Parallel GPU pipelines',
    svg: `<svg viewBox="0 0 36 36" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="6" width="30" height="7" rx="2.5"/>
      <rect x="3" y="16" width="30" height="7" rx="2.5"/>
      <rect x="3" y="26" width="30" height="7" rx="2.5"/>
    </svg>`
  },
  {
    name: 'skew',
    desc: '3D transform / shear',
    svg: `<svg viewBox="0 0 36 36" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M22 6l-8 24"/>
      <path d="M30 6l-8 24"/>
      <path d="M14 6H30"/>
      <path d="M6 30H22"/>
    </svg>`
  },
  {
    name: 'camera.filters',
    desc: 'Image / shader processing',
    svg: `<svg viewBox="0 0 36 36" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="14" cy="16" r="7"/>
      <circle cx="22" cy="16" r="7"/>
      <circle cx="18" cy="24" r="7"/>
    </svg>`
  },
  {
    name: 'photo.artframe',
    desc: 'Visual / image rendering',
    svg: `<svg viewBox="0 0 36 36" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="4" y="4" width="28" height="28" rx="3"/>
      <rect x="9" y="9" width="18" height="18" rx="2"/>
      <path d="M9 22l5-5 4 4 3-3 5 5"/>
      <circle cx="14" cy="15" r="2"/>
    </svg>`
  },
  {
    name: 'waveform',
    desc: 'GPU signal / compute',
    svg: `<svg viewBox="0 0 36 36" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M2 18h4l4-10 4 20 4-16 4 12 4-8 4 4 4 0"/>
    </svg>`
  }
];

// Mini SVGs for menu bar (12px)
const miniSvgs = {
  'display': `<svg viewBox="0 0 14 14" fill="none" stroke="white" stroke-width="1.3" stroke-linecap="round"><rect x="1" y="1.5" width="12" height="8.5" rx="1.5"/><path d="M4.5 13h5M7 10v3"/></svg>`,
  'sparkles': `<svg viewBox="0 0 14 14" fill="none" stroke="white" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><path d="M7 1l1 4 4 1-4 1-1 4-1-4-4-1 4-1z"/></svg>`,
  'rays': `<svg viewBox="0 0 14 14" fill="none" stroke="white" stroke-width="1.3" stroke-linecap="round"><circle cx="7" cy="7" r="2.5"/><path d="M7 1v2M7 11v2M1 7h2M11 7h2M2.9 2.9l1.4 1.4M9.7 9.7l1.4 1.4M11.1 2.9L9.7 4.3M4.3 9.7L2.9 11.1"/></svg>`,
  'triangle': `<svg viewBox="0 0 14 14" fill="none" stroke="white" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><path d="M7 2L13 12H1L7 2z"/></svg>`,
  'checkerboard.rectangle': `<svg viewBox="0 0 14 14" fill="none" stroke="white" stroke-width="1.2" stroke-linecap="round"><rect x="1" y="3" width="12" height="8" rx="1"/><path d="M1 3h3v3H1zM7 3h3v3H7zM4 6h3v2.5H4zM10 6h3v2.5H10zM1 8.5h3V11H1zM7 8.5h3V11H7z"/></svg>`,
  'rectangle.3.group': `<svg viewBox="0 0 14 14" fill="none" stroke="white" stroke-width="1.3" stroke-linecap="round"><rect x="1" y="1.5" width="12" height="3" rx="1"/><rect x="1" y="6" width="12" height="2.5" rx="1"/><rect x="1" y="10" width="12" height="2.5" rx="1"/></svg>`,
  'skew': `<svg viewBox="0 0 14 14" fill="none" stroke="white" stroke-width="1.3" stroke-linecap="round"><path d="M9 1L5 13M13 1L9 13M5 1h8M1 13h8"/></svg>`,
  'camera.filters': `<svg viewBox="0 0 14 14" fill="none" stroke="white" stroke-width="1.2" stroke-linecap="round"><circle cx="5.5" cy="6" r="3"/><circle cx="8.5" cy="6" r="3"/><circle cx="7" cy="9" r="3"/></svg>`,
  'photo.artframe': `<svg viewBox="0 0 14 14" fill="none" stroke="white" stroke-width="1.3" stroke-linecap="round"><rect x="1" y="1" width="12" height="12" rx="1.5"/><rect x="3" y="3" width="8" height="8" rx="1"/><path d="M3 9l2.5-2.5 2 2 1.5-1.5L11 9"/><circle cx="5.5" cy="5.5" r="1"/></svg>`,
  'waveform': `<svg viewBox="0 0 14 14" fill="none" stroke="white" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><path d="M0 7h2l2-4.5 2 9 2-7 2 5 1.5-3 1.5 0.5H14"/></svg>`
};

let selected = 'display';

function render() {
  const grid = document.getElementById('icon-grid');
  grid.innerHTML = icons.map(ic => `
    <div class="icon-card ${ic.name === selected ? 'selected' : ''}" onclick="select('${ic.name}')" id="card-${ic.name}">
      <div class="check">
        <svg viewBox="0 0 10 10" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1.5 5l2.5 2.5L8.5 2"/>
        </svg>
      </div>
      <div class="icon-viz">${ic.svg}</div>
      <div class="icon-name">${ic.name}</div>
      <div class="icon-desc">${ic.desc}</div>
    </div>
  `).join('');
  updateMenuBar();
}

function select(name) {
  selected = name;
  document.getElementById('apply-name').textContent = name;
  document.querySelectorAll('.icon-card').forEach(c => c.classList.remove('selected'));
  const card = document.getElementById('card-' + name);
  if (card) { card.classList.add('selected'); }
  updateMenuBar();
}

function updateMenuBar() {
  const el = document.getElementById('mb-icon');
  el.innerHTML = miniSvgs[selected] || '';
  const gpu = document.getElementById('mb-gpu');
  gpu.classList.remove('changed');
  void gpu.offsetWidth; // reflow
  gpu.classList.add('changed');
}

function copyName() {
  navigator.clipboard.writeText(selected).then(() => {
    const btn = document.querySelector('.apply-btn');
    const orig = btn.innerHTML;
    btn.innerHTML = `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 8l3.5 3.5L13 4" stroke-linecap="round" stroke-linejoin="round"/></svg> Copied! <span class="selected-name">${selected}</span>`;
    btn.style.background = 'linear-gradient(135deg, #34d883 0%, #22b866 100%)';
    setTimeout(() => {
      btn.innerHTML = orig;
      btn.style.background = '';
    }, 2000);
  });
}

render();
</script>
</body>
</html>
